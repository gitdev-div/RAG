<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Agent | Cyberpunk UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b10; --bg2: #0d1117; --bg3: #131a24;
    --border: #1e2d3d; --border2: #243447;
    --accent: #00d4ff; --accent2: #0099bb;
    --accent-glow: rgba(0, 212, 255, 0.12);
    --green: #00ff9d; --green-dim: rgba(0, 255, 157, 0.08);
    --red: #ff4444; --text: #c8d6e5; --text2: #7a92a8; --text3: #3d5166;
    --mono: 'JetBrains Mono', monospace; --display: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo { font-family: var(--display); font-weight: 800; font-size: 16px; color: #fff; display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse-dot 2s infinite; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.85); } }

  .header-meta { display: flex; align-items: center; gap: 12px; }
  .format-badges { display: flex; gap: 4px; margin-right: 10px; }
  .badge { font-size: 9px; padding: 2px 5px; border: 1px solid var(--border); border-radius: 3px; color: var(--text3); }
  
  select#language-toggle { background: var(--bg3); color: var(--accent); border: 1px solid var(--border); font-family: var(--mono); font-size: 10px; padding: 4px; border-radius: 4px; cursor: pointer; outline: none; }

  .layout { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 280px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 16px; gap: 24px; }
  .sidebar-section-label { font-size: 10px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }

  .upload-zone { border: 1px dashed var(--border2); border-radius: 8px; padding: 20px 16px; text-align: center; cursor: pointer; background: var(--bg3); position: relative; transition: 0.2s; }
  .upload-zone:hover { border-color: var(--accent); background: var(--accent-glow); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  
  .btn-upload { width: 100%; padding: 9px; background: transparent; border: 1px solid var(--accent); border-radius: 6px; color: var(--accent); font-family: var(--mono); font-size: 12px; cursor: pointer; margin-top: 10px; }
  .btn-upload:disabled { opacity: 0.3; cursor: not-allowed; }

  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .msg { display: flex; gap: 12px; max-width: 85%; }
  .msg.ai { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-body { padding: 12px 16px; border-radius: 8px; background: var(--bg2); border: 1px solid var(--border); line-height: 1.6; }
  .msg.user .msg-body { background: var(--bg3); border-color: var(--accent2); color: #fff; }

  .input-bar { padding: 20px; background: var(--bg2); border-top: 1px solid var(--border); }
  .input-wrap { display: flex; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; padding: 8px 12px; align-items: flex-end; }
  textarea { flex: 1; background: transparent; border: none; color: var(--text); resize: none; outline: none; font-family: var(--mono); }
  .btn-send { background: var(--accent); border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; color: #000; }

  .file-card { background: var(--bg3); border: 1px solid var(--border); padding: 10px; border-radius: 6px; display: none; }
  .visible { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div> RAG AGENT</div>
  <div class="header-meta">
    <div class="format-badges">
      <span class="badge">PDF</span><span class="badge">DOCX</span><span class="badge">CSV</span><span class="badge">TXT</span>
    </div>
    <select id="language-toggle">
      <option value="en">ENGLISH</option>
      <option value="he">HEBREW (עברית)</option>
      <option value="ru">RUSSIAN (РУС)</option>
    </select>
    <div class="status-pill" style="color:var(--green); font-size:10px; margin-left:10px;">● ONLINE</div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div>
      <div class="sidebar-section-label">// Ingest</div>
      <div class="upload-zone">
        <input type="file" id="file-input" accept=".txt,.pdf,.docx,.csv">
        <p style="font-size:11px; color:var(--text2);">Drop file or click</p>
      </div>
      <button class="btn-upload" id="upload-btn" disabled>INGEST DATA</button>
      <div id="upload-status" style="font-size:10px; margin-top:8px;"></div>
    </div>
    <div id="file-card" class="file-card">
      <div class="sidebar-section-label">// Loaded</div>
      <div id="file-name" style="color:var(--accent); font-size:11px; margin-bottom:4px;"></div>
      <div id="file-chunks" style="color:var(--text3); font-size:10px;"></div>
    </div>
  </aside>

  <main class="chat-area">
    <div id="messages"></div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="user-input" placeholder="Query knowledge base..." rows="1"></textarea>
        <button id="send-btn" class="btn-send">➤</button>
      </div>
    </div>
  </main>
</div>

<script>
  const fileInput = document.getElementById('file-input');
  const uploadBtn = document.getElementById('upload-btn');
  const messages = document.getElementById('messages');
  const userInput = document.getElementById('user-input');
  const langToggle = document.getElementById('language-toggle');

  fileInput.onchange = () => { if(fileInput.files[0]) uploadBtn.disabled = false; };

  uploadBtn.onclick = async () => {
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    uploadBtn.innerText = "CHUNKING...";
    
    const res = await fetch('/upload', { method: 'POST', body: formData });
    const data = await res.json();
    
    if(data.status === 'success') {
      document.getElementById('file-card').classList.add('visible');
      document.getElementById('file-name').innerText = data.filename;
      document.getElementById('file-chunks').innerText = `${data.chunks} vectors indexed`;
      uploadBtn.innerText = "INGEST DATA";
      appendMsg('ai', `Database updated with <b>${data.filename}</b>.`);
    }
  };

  async function sendMessage() {
    const val = userInput.value.trim();
    if(!val) return;
    const lang = langToggle.value;
    userInput.value = '';
    
    appendMsg('user', val);
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: val, lang: lang })
    });
    const data = await res.json();
    const aiMsg = appendMsg('ai', data.response);
    
    if(lang === 'he') {
      aiMsg.style.direction = 'rtl';
      aiMsg.style.textAlign = 'right';
    }
  }

  document.getElementById('send-btn').onclick = sendMessage;
  userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  function appendMsg(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="msg-body">${text}</div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }
</script>
</body>
</html>
